<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fleet Dispatch — Control Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#0B0D0C;
  --bg-2:#101311;
  --panel:#141815;
  --panel-2:#181D1A;
  --panel-3:#202820;
  --panel-hover:#263027;
  --border:#2A342D;
  --border-soft:#202821;
  --border-strong:#3B4A40;
  --text:#F0F3EF;
  --text-2:#B2BCB4;
  --text-3:#778277;
  --text-4:#586158;
  --accent:#62D2A2;
  --accent-dim:#27664c;
  --accent-glow:rgba(98,210,162,.32);
  --depot:#F5C451;
  --ok:#34D399;

  --sev-low:#6E89BE;
  --sev-medium:#F2C94C;
  --sev-high:#F2994A;
  --sev-critical:#FF4D5E;
  --sev-low-bg:rgba(110,137,190,.14);
  --sev-medium-bg:rgba(242,201,76,.14);
  --sev-high-bg:rgba(242,153,74,.15);
  --sev-critical-bg:rgba(255,77,94,.16);

  --st-at_depot:#8A93A6;
  --st-in_transit:#4DA6FF;
  --st-on_route:#34D399;
  --st-broken:#FF4D5E;
  --st-maintenance:#C792EA;

  --r-sm:5px;
  --r-md:7px;
  --r-lg:8px;
  --shadow:0 8px 28px rgba(0,0,0,.45);
  --shadow-lg:0 18px 50px rgba(0,0,0,.6);
  --sans:"IBM Plex Sans",system-ui,-apple-system,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,monospace;
}

*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{
  font-family:var(--sans);
  background:linear-gradient(180deg,#0D100E 0%,var(--bg) 42%,#090B0A 100%);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  font-size:14px;
  line-height:1.45;
}
#root{height:100vh;}

/* scrollbars */
*::-webkit-scrollbar{width:9px;height:9px;}
*::-webkit-scrollbar-thumb{background:#222C44;border-radius:20px;border:2px solid transparent;background-clip:padding-box;}
*::-webkit-scrollbar-thumb:hover{background:#33405f;background-clip:padding-box;}
*::-webkit-scrollbar-track{background:transparent;}

.mono{font-family:var(--mono);font-variant-numeric:tabular-nums;}

/* ============ LAYOUT ============ */
.app{display:flex;flex-direction:column;height:100vh;}
.workspace{flex:1;display:grid;grid-template-columns:316px 1fr 412px;gap:12px;padding:12px;min-height:0;}
.col{display:flex;flex-direction:column;gap:12px;min-height:0;min-width:0;}
.col-center{gap:12px;}
.ops-layout{
  flex:1;
  display:grid;
  grid-template-columns:minmax(296px,344px) minmax(420px,1fr) minmax(326px,388px);
  gap:10px;
  padding:10px;
  min-height:0;
}
.queue-rail,.map-workspace,.context-rail{
  display:flex;
  flex-direction:column;
  gap:10px;
  min-width:0;
  min-height:0;
}
.map-workspace{min-width:420px;}
.map-shell{flex:1;padding:0;overflow:hidden;position:relative;}
.context-rail .context-panel{flex:1 1 auto;}
.context-rail > .panel:last-child{flex:0 0 auto;}

.panel{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  display:flex;flex-direction:column;min-height:0;
  box-shadow:0 10px 24px rgba(0,0,0,.28);
}
.panel-head{
  display:flex;align-items:center;gap:10px;
  padding:13px 15px;
  border-bottom:1px solid var(--border-soft);
  flex-shrink:0;
}
.panel-head h2{
  font-size:12px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;
  color:var(--text-2);margin:0;
}
.panel-sub{font-size:11px;color:var(--text-4);margin-top:2px;letter-spacing:.01em;}
.panel-head .count{
  font-family:var(--mono);font-size:11px;color:var(--text-3);
  background:var(--panel-3);border:1px solid var(--border-soft);
  padding:1px 7px;border-radius:20px;
}
.panel-body{overflow-y:auto;flex:1;min-height:0;}
.panel-body.pad{padding:12px;}

/* ============ HEADER / KPI ============ */
.header{
  display:flex;align-items:stretch;gap:14px;
  padding:11px 16px;
  background:linear-gradient(180deg,#151A16,#0E110F);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.brand{display:flex;align-items:center;gap:12px;padding-right:16px;border-right:1px solid var(--border-soft);}
.brand-mark{
  width:38px;height:38px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(150deg,#223126,#121713);
  border:1px solid var(--border-strong);
  display:grid;place-items:center;
  box-shadow:inset 0 0 16px rgba(98,210,162,.16);
}
.brand-name{font-weight:700;font-size:15px;letter-spacing:.01em;line-height:1.1;white-space:nowrap;}
.brand-sub{font-size:11px;color:var(--text-3);letter-spacing:.04em;white-space:nowrap;}

.live-dot{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--ok);text-transform:uppercase;}
.live-dot i{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 0 rgba(52,211,153,.6);animation:livepulse 2s infinite;}
.live-dot.paused{color:var(--text-3);}
.live-dot.paused i{background:var(--text-3);animation:none;box-shadow:none;}
@keyframes livepulse{0%{box-shadow:0 0 0 0 rgba(52,211,153,.55);}70%{box-shadow:0 0 0 7px rgba(52,211,153,0);}100%{box-shadow:0 0 0 0 rgba(52,211,153,0);}}

.loading-slot{
  width:190px;
  min-height:28px;
  display:flex;
  align-items:center;
  flex-shrink:0;
}
.loading-pill{
  display:inline-flex;
  align-items:center;
  gap:7px;
  border:1px solid rgba(98,210,162,.38);
  background:rgba(98,210,162,.1);
  color:#BFF2D7;
  border-radius:999px;
  padding:5px 9px;
  font-size:11px;
  font-weight:700;
  letter-spacing:.04em;
  white-space:nowrap;
  animation:fadein .18s ease-out;
  max-width:100%;
  overflow:hidden;
}
.loading-pill span:last-child{overflow:hidden;text-overflow:ellipsis;}
.loading-pill.tick{
  border-color:rgba(96,165,250,.34);
  background:rgba(96,165,250,.1);
  color:#BFDBFE;
}
.mini-spinner{
  width:13px;
  height:13px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,.22);
  border-top-color:currentColor;
  display:inline-block;
  flex-shrink:0;
  animation:spin .8s linear infinite;
}
.mini-spinner.dark{border-color:rgba(6,16,31,.22);border-top-color:#06101f;}
@keyframes fadein{from{opacity:0;transform:translateY(-2px);}to{opacity:1;transform:none;}}

.kpis{display:flex;align-items:stretch;gap:10px;flex:1;}
.kpi{
  flex:1;min-width:0;
  background:var(--panel);
  border:1px solid var(--border-soft);
  border-radius:var(--r-md);
  padding:8px 14px;
  display:flex;flex-direction:column;justify-content:center;
  position:relative;overflow:hidden;
}
.kpi .k-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);font-weight:600;}
.kpi .k-val{font-family:var(--mono);font-size:24px;font-weight:600;line-height:1.1;letter-spacing:-.01em;}
.kpi .k-unit{font-size:11px;color:var(--text-3);margin-left:4px;font-family:var(--sans);}
.kpi.alert{border-color:var(--sev-critical);background:linear-gradient(180deg,rgba(255,77,94,.14),rgba(255,77,94,.04));}
.kpi.alert .k-val{color:#FF6E7C;}
.kpi.alert .k-label{color:#FF8A95;}
.kpi.alert.pulse{animation:kpipulse 1.4s ease-in-out infinite;}
@keyframes kpipulse{0%,100%{box-shadow:0 0 0 0 rgba(255,77,94,0);}50%{box-shadow:0 0 0 3px rgba(255,77,94,.18);}}
.kpi.clock-kpi .k-val{font-size:20px;}

/* ============ SIM CONTROLS ============ */
.simctl{display:flex;align-items:center;gap:8px;padding-left:14px;border-left:1px solid var(--border-soft);}
.btn{
  font-family:var(--sans);font-size:12.5px;font-weight:600;
  border:1px solid var(--border-strong);
  background:var(--panel-2);color:var(--text);
  padding:8px 13px;border-radius:8px;cursor:pointer;
  display:inline-flex;align-items:center;gap:7px;white-space:nowrap;
  transition:background .14s,border-color .14s,transform .06s,color .14s;
}
.btn:hover{background:var(--panel-hover);border-color:#3a4a6e;}
.btn:active{transform:translateY(1px);}
.btn.ghost{background:transparent;}
.btn.icon{padding:8px;width:36px;justify-content:center;}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#06101f;}
.btn.primary:hover{background:#69b4ff;border-color:#69b4ff;}
.btn.play{background:linear-gradient(180deg,#3ad17e,#27b56a);border-color:#27b56a;color:#06150d;}
.btn.play:hover{filter:brightness(1.08);}
.btn.pausebtn{background:var(--panel-3);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn .mini-spinner{width:12px;height:12px;}

.speed{display:inline-flex;align-items:center;background:var(--panel);border:1px solid var(--border-soft);border-radius:8px;overflow:hidden;}
.speed button{background:transparent;border:none;color:var(--text-3);font-family:var(--mono);font-size:11px;font-weight:600;padding:7px 9px;cursor:pointer;transition:.12s;}
.speed button:hover{color:var(--text);}
.speed button.on{background:var(--accent-dim);color:#dbeeff;}

/* ============ BADGES / CHIPS ============ */
.sev-chip{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:5px;border:1px solid;font-family:var(--sans);}
.sev-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}
.sev-low{color:var(--sev-low);border-color:rgba(110,137,190,.5);background:var(--sev-low-bg);}
.sev-medium{color:var(--sev-medium);border-color:rgba(242,201,76,.5);background:var(--sev-medium-bg);}
.sev-high{color:var(--sev-high);border-color:rgba(242,153,74,.5);background:var(--sev-high-bg);}
.sev-critical{color:#FF7079;border-color:rgba(255,77,94,.6);background:var(--sev-critical-bg);}

.engine-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;letter-spacing:.05em;padding:2px 7px;border-radius:5px;text-transform:uppercase;border:1px solid var(--border-strong);color:var(--text-2);background:var(--panel-3);}
.engine-badge.claude{color:#E0A37A;border-color:rgba(224,163,122,.4);background:rgba(224,163,122,.1);}
.engine-badge.local_nim{color:#9FE08E;border-color:rgba(159,224,142,.35);background:rgba(159,224,142,.1);}
.engine-badge.rule_based{color:#7FB4E8;border-color:rgba(127,180,232,.35);background:rgba(127,180,232,.1);}
.engine-badge.human{color:#C792EA;border-color:rgba(199,146,234,.35);background:rgba(199,146,234,.1);}

.tag{font-family:var(--mono);font-size:11px;color:var(--text-2);background:var(--panel-3);border:1px solid var(--border-soft);padding:1px 6px;border-radius:4px;}

/* ============ EVENT LIST ============ */
.event-row{
  display:flex;gap:11px;padding:11px 14px;
  border-bottom:1px solid var(--border-soft);
  cursor:pointer;position:relative;
  transition:background .14s;
}
.event-row:hover{background:var(--panel-2);}
.event-row.sel{background:var(--panel-3);}
.event-row::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ev-accent,var(--border));}
.ev-ico{width:34px;height:34px;border-radius:9px;flex-shrink:0;display:grid;place-items:center;background:var(--panel-3);border:1px solid var(--border-soft);color:var(--ev-accent,var(--text-2));}
.ev-main{flex:1;min-width:0;}
.ev-top{display:flex;align-items:center;gap:8px;justify-content:space-between;}
.ev-type{font-weight:600;font-size:13px;color:var(--text);}
.ev-meta{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap;}
.ev-target{font-family:var(--mono);font-size:11.5px;color:var(--text-2);}
.ev-age{font-family:var(--mono);font-size:10.5px;color:var(--text-4);margin-left:auto;}

/* ============ DECISION CARD (approval queue) ============ */
.dec-card{
  background:linear-gradient(180deg,var(--panel-3),var(--panel-2));
  border:1px solid var(--border);
  border-left:3px solid var(--dc-accent,var(--accent));
  border-radius:var(--r-md);
  padding:13px 14px;margin:0 0 11px 0;
  position:relative;
}
.dec-card.crit{border-left-color:var(--sev-critical);box-shadow:0 0 0 1px rgba(255,77,94,.12);}
.dec-top{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.dec-action{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:14px;letter-spacing:.01em;}
.dec-action .a-ico{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;background:var(--dc-accent-bg,rgba(77,166,255,.14));color:var(--dc-accent,var(--accent));}
.dec-desc{font-size:13px;color:var(--text);line-height:1.5;margin-bottom:11px;}
.dec-desc b{color:#fff;font-weight:600;}
.dec-impact{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
.impact-pill{display:inline-flex;align-items:baseline;gap:6px;background:var(--panel);border:1px solid var(--border-soft);border-radius:7px;padding:6px 11px;}
.impact-pill .iv{font-family:var(--mono);font-size:17px;font-weight:600;}
.impact-pill .il{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);}
.impact-pill.delay .iv{color:var(--sev-high);}
.impact-pill.delay.heavy .iv{color:var(--sev-critical);}
.dec-actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.dec-btn{font-family:var(--sans);font-weight:600;font-size:13px;border-radius:8px;padding:10px;cursor:pointer;border:1px solid;display:flex;align-items:center;justify-content:center;gap:7px;transition:.13s;}
.dec-btn.approve{background:rgba(52,211,153,.13);border-color:rgba(52,211,153,.45);color:#5BE3AE;}
.dec-btn.approve:hover{background:rgba(52,211,153,.24);}
.dec-btn.reject{background:rgba(255,77,94,.1);border-color:rgba(255,77,94,.4);color:#FF8088;}
.dec-btn.reject:hover{background:rgba(255,77,94,.2);}
.dec-btn:disabled{opacity:.55;cursor:not-allowed;}
.dec-meta{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border-soft);font-size:11px;color:var(--text-3);}

/* resolved decision toast row */
.dec-resolved{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;border:1px solid var(--border-soft);background:var(--panel);margin-bottom:8px;font-size:12px;}
.dec-resolved .rico{width:20px;height:20px;border-radius:5px;display:grid;place-items:center;flex-shrink:0;}
.dec-resolved.approved .rico{background:rgba(52,211,153,.16);color:var(--ok);}
.dec-resolved.rejected .rico{background:rgba(255,77,94,.16);color:var(--sev-critical);}
.dec-resolved .rtxt{flex:1;min-width:0;color:var(--text-2);}
.dec-resolved .rtxt b{color:var(--text);font-weight:600;}

/* auto-handled feed item */
.auto-item{display:flex;gap:9px;align-items:flex-start;padding:8px 10px;border-radius:7px;font-size:12px;color:var(--text-2);border:1px dashed var(--border);background:rgba(77,166,255,.04);margin-bottom:7px;}
.auto-item .aico{color:var(--accent);flex-shrink:0;margin-top:1px;}

/* ============ FLEET STRIP ============ */
.fleet-strip{display:flex;gap:10px;padding:11px;overflow-x:auto;}
.veh-card{
  flex:1;min-width:148px;
  background:var(--panel-2);border:1px solid var(--border-soft);
  border-radius:var(--r-md);padding:11px 12px;cursor:pointer;transition:.14s;
  position:relative;overflow:hidden;
}
.veh-card:hover{border-color:var(--border-strong);background:var(--panel-3);}
.veh-card.sel{border-color:var(--accent);}
.veh-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.veh-id{font-family:var(--mono);font-weight:600;font-size:14px;}
.veh-stat{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--vs,var(--text-2));margin-left:auto;}
.veh-stat i{width:8px;height:8px;border-radius:50%;background:var(--vs,var(--text-2));}
.veh-bar{height:5px;border-radius:3px;background:var(--panel);overflow:hidden;margin-top:9px;}
.veh-bar i{display:block;height:100%;background:var(--vs,var(--accent));border-radius:3px;transition:width .5s;}
.veh-sub{font-size:11px;color:var(--text-3);margin-top:7px;display:flex;justify-content:space-between;}

/* ============ VOICE PANEL ============ */
.voice{padding:13px 14px;display:flex;flex-direction:column;gap:11px;}
.voice-input{position:relative;}
.voice-input textarea{
  width:100%;resize:none;font-family:var(--sans);font-size:13px;color:var(--text);
  background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r-md);
  padding:12px 13px;min-height:62px;line-height:1.5;
}
.voice-input textarea:focus{outline:none;border-color:var(--accent-dim);box-shadow:0 0 0 3px rgba(77,166,255,.12);}
.voice-input textarea::placeholder{color:var(--text-4);}
.voice-tools{display:flex;align-items:center;gap:8px;}
.mic-btn{width:42px;height:42px;border-radius:11px;flex-shrink:0;border:1px solid var(--border-strong);background:var(--panel-3);color:var(--text);display:grid;place-items:center;cursor:pointer;transition:.14s;position:relative;}
.mic-btn:hover{background:var(--panel-hover);}
.mic-btn:disabled{opacity:.45;cursor:not-allowed;}
.mic-btn.rec{background:var(--sev-critical);border-color:var(--sev-critical);color:#fff;animation:micpulse 1.3s infinite;}
@keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,77,94,.5);}50%{box-shadow:0 0 0 9px rgba(255,77,94,0);}}
.examples{display:flex;gap:7px;flex-wrap:wrap;}
.ex-chip{font-size:11px;color:var(--text-2);background:var(--panel-2);border:1px solid var(--border-soft);border-radius:20px;padding:4px 10px;cursor:pointer;transition:.13s;}
.ex-chip:hover{border-color:var(--accent-dim);color:var(--text);}

.waveform{display:flex;align-items:center;gap:3px;height:40px;flex:1;padding:0 4px;}
.waveform i{flex:1;background:var(--accent);border-radius:2px;height:18%;opacity:.8;}
.waveform.live i{animation:wave .7s ease-in-out infinite;}
@keyframes wave{0%,100%{height:14%;}50%{height:90%;}}

.intake-flow{border-top:1px dashed var(--border);padding-top:12px;display:flex;flex-direction:column;gap:11px;max-height:34vh;overflow-y:auto;}
.flow-step{opacity:0;transform:translateY(6px);animation:flowin .4s forwards;}
@keyframes flowin{to{opacity:1;transform:none;}}
.flow-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.heard{font-size:13px;color:var(--text);font-style:italic;background:var(--bg-2);border:1px solid var(--border-soft);border-radius:8px;padding:10px 12px;}
.heard b{font-style:normal;color:var(--accent);font-weight:600;}
.extract-chips{display:flex;flex-wrap:wrap;gap:8px;}
.xchip{display:inline-flex;align-items:center;gap:8px;background:var(--panel-3);border:1px solid var(--border-strong);border-radius:8px;padding:6px 10px;font-size:12px;}
.xchip .xt{font-weight:600;}
.xchip .xtarget{font-family:var(--mono);color:var(--text-2);}

/* ============ MAP ============ */
.map-wrap{flex:1;position:relative;overflow:hidden;border-radius:var(--r-lg);min-height:0;}
.map-svg{width:100%;height:100%;display:block;background:#f2ebd9;}
.map-overlay{position:absolute;inset:0;pointer-events:none;}
.legend{position:absolute;left:14px;bottom:14px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border:1px solid #e2e8f0;border-radius:var(--r-md);padding:11px 13px;display:flex;flex-direction:column;gap:7px;pointer-events:auto;box-shadow:0 4px 12px rgba(0,0,0,.08);}
.legend-row{display:flex;align-items:center;gap:8px;font-size:11px;color:#475569;}
.legend-row .ldot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.map-title{position:absolute;left:14px;top:14px;display:flex;align-items:center;gap:10px;pointer-events:none;color:#1e293b;background:rgba(255,255,255,.8);padding:6px 12px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.06);}
.map-title .mt-name{font-size:13px;font-weight:600;white-space:nowrap;}
.map-title .mt-sub{font-size:11px;color:#64748b;font-family:var(--mono);white-space:nowrap;}
.map-stats{position:absolute;right:14px;top:14px;display:flex;gap:8px;pointer-events:none;}
.map-stat{background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border:1px solid #e2e8f0;border-radius:8px;padding:6px 11px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.08);}
.map-stat .ms-v{font-family:var(--mono);font-size:16px;font-weight:600;line-height:1;color:#1e293b;}
.map-stat .ms-l{font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;color:#64748b;margin-top:3px;}

.node-label{font-family:var(--mono);font-size:9px;fill:var(--text-2);}
.veh-marker text{font-family:var(--mono);font-size:8px;font-weight:600;}

/* tooltip on map */
.map-tip{position:absolute;background:rgba(8,11,18,.95);border:1px solid var(--border-strong);border-radius:8px;padding:8px 11px;font-size:12px;pointer-events:none;box-shadow:var(--shadow);z-index:5;min-width:130px;}
.map-tip .tt-id{font-family:var(--mono);font-weight:600;margin-bottom:2px;}
.map-tip .tt-row{font-size:11px;color:var(--text-2);display:flex;justify-content:space-between;gap:14px;}
.map-loading{
  position:absolute;
  inset:0;
  z-index:8;
  pointer-events:none;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding-top:58px;
  background:linear-gradient(180deg,rgba(11,13,12,.18),rgba(11,13,12,0) 42%);
}
.map-loading.initial{
  align-items:center;
  padding-top:0;
  background:rgba(11,13,12,.36);
  backdrop-filter:blur(2px);
}
.map-loading-card{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:9px 13px;
  border-radius:999px;
  color:#102018;
  background:rgba(255,255,255,.92);
  border:1px solid rgba(255,255,255,.75);
  box-shadow:0 8px 22px rgba(0,0,0,.18);
  font-size:12px;
  font-weight:700;
  animation:floatin .2s ease-out;
}
.loader-ring{
  width:18px;
  height:18px;
  border-radius:50%;
  border:3px solid rgba(39,102,76,.18);
  border-top-color:var(--accent-dim);
  animation:spin .8s linear infinite;
}
@keyframes floatin{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:none;}}

/* ============ EMPTY STATES ============ */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:34px 20px;text-align:center;color:var(--text-3);height:100%;}
.empty .e-ico{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;background:var(--panel-2);border:1px solid var(--border-soft);color:var(--text-4);}
.empty .e-title{font-weight:600;color:var(--text-2);font-size:13px;}
.empty .e-sub{font-size:12px;max-width:200px;}

/* new-item attention */
.attention{animation:attn 1.6s ease-out;}
@keyframes attn{0%{box-shadow:0 0 0 2px var(--accent),0 0 22px var(--accent-glow);}100%{box-shadow:0 0 0 0 transparent;}}
.flash-in{animation:flashin .45s ease-out;}
@keyframes flashin{from{opacity:0;transform:translateX(10px);}to{opacity:1;transform:none;}}

.sectile{display:flex;align-items:center;gap:9px;}
.toggle-tabs{display:flex;gap:4px;background:var(--panel);border:1px solid var(--border-soft);border-radius:8px;padding:3px;margin-left:auto;}
.toggle-tabs button{background:transparent;border:none;color:var(--text-3);font-family:var(--sans);font-size:11px;font-weight:600;padding:4px 10px;border-radius:5px;cursor:pointer;transition:.12s;}
.toggle-tabs button.on{background:var(--panel-3);color:var(--text);}

/* ============ OPERATIONS QUEUE ============ */
.ops-queue{height:100%;}
.queue-head{align-items:flex-start;}
.queue-tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:4px;
  padding:8px;
  border-bottom:1px solid var(--border-soft);
}
.queue-tabs button{
  min-width:0;
  background:transparent;
  border:1px solid transparent;
  border-radius:var(--r-md);
  color:var(--text-3);
  cursor:pointer;
  padding:7px 6px;
  display:flex;
  flex-direction:column;
  gap:2px;
  align-items:center;
  font-family:var(--sans);
  transition:.14s;
}
.queue-tabs button span{font-size:11px;font-weight:600;}
.queue-tabs button b{font-family:var(--mono);font-size:13px;color:var(--text-2);}
.queue-tabs button:hover{background:var(--panel-2);color:var(--text);}
.queue-tabs button.on{background:var(--panel-3);border-color:var(--border-strong);color:var(--text);}
.queue-body{padding:8px;display:flex;flex-direction:column;gap:8px;}
.queue-item{
  width:100%;
  text-align:left;
  display:grid;
  grid-template-columns:34px minmax(0,1fr) auto;
  align-items:center;
  gap:10px;
  border:1px solid var(--border-soft);
  border-left:3px solid var(--qi,var(--accent));
  background:var(--panel-2);
  color:var(--text);
  border-radius:var(--r-md);
  padding:10px;
  cursor:pointer;
  font-family:var(--sans);
  transition:.14s;
}
.queue-item:hover{background:var(--panel-hover);border-color:var(--border-strong);}
.queue-item.sel{box-shadow:0 0 0 1px var(--accent);background:#1E2922;}
.qi-icon{
  width:32px;height:32px;border-radius:var(--r-md);
  display:grid;place-items:center;
  background:rgba(255,255,255,.04);
  color:var(--qi,var(--accent));
}
.qi-main{min-width:0;display:flex;flex-direction:column;gap:3px;}
.qi-title{font-weight:700;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.qi-sub{font-size:12px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.qi-meta{display:flex;gap:7px;flex-wrap:wrap;font-size:10.5px;color:var(--text-4);}
.qi-meta span{background:rgba(255,255,255,.04);border:1px solid var(--border-soft);border-radius:4px;padding:1px 5px;}
.linkish{color:var(--accent)!important;text-decoration:none;}
.embedded-panel{display:flex;flex-direction:column;min-height:0;flex:1;}

/* ============ CONTEXT DRAWER ============ */
.context-body{display:flex;flex-direction:column;gap:12px;}
.hero-status{
  border:1px solid var(--border-soft);
  border-left:3px solid var(--accent);
  background:linear-gradient(180deg,#18201A,#121613);
  border-radius:var(--r-md);
  padding:13px;
}
.hero-status.warn{border-left-color:var(--sev-high);}
.hero-status.danger{border-left-color:var(--sev-critical);}
.hs-kicker{font-size:10px;letter-spacing:.11em;text-transform:uppercase;color:var(--text-3);font-weight:700;margin-bottom:5px;}
.hs-title{font-size:18px;line-height:1.2;font-weight:700;color:var(--text);}
.hs-text{font-size:12.5px;color:var(--text-2);line-height:1.5;margin-top:7px;}
.detail-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
.metric{
  border:1px solid var(--border-soft);
  background:var(--panel-2);
  border-radius:var(--r-md);
  padding:10px;
  min-width:0;
}
.metric span{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-4);font-weight:700;}
.metric b{display:block;font-family:var(--mono);font-size:18px;line-height:1.15;margin-top:4px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.metric.warn b{color:var(--sev-high);}
.metric.danger b{color:var(--sev-critical);}
.detail-section{
  border-top:1px solid var(--border-soft);
  padding-top:12px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--text-3);font-weight:700;}
.detail-line,.route-preview-row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
  font-size:12px;
}
.detail-line span,.route-preview-row span{color:var(--text-3);}
.detail-line b,.route-preview-row b{color:var(--text);font-weight:600;text-align:right;min-width:0;}
.route-preview-row{
  border:1px solid var(--border-soft);
  background:var(--panel-2);
  border-radius:var(--r-md);
  padding:8px 9px;
}
.route-string{
  border:1px solid var(--border-soft);
  background:var(--bg-2);
  border-radius:var(--r-md);
  padding:10px;
  color:var(--text-2);
  font-size:11px;
  line-height:1.5;
  overflow-wrap:anywhere;
}
.hint{font-size:11.5px;color:var(--text-4);line-height:1.45;}
.sticky-actions{
  position:sticky;
  bottom:0;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
  padding-top:8px;
  background:linear-gradient(180deg,rgba(20,24,21,0),var(--panel) 32%);
}
.muted{color:var(--text-4);}

/* map animations */
.route-flow{animation:dashflow 1.1s linear infinite;}
@keyframes dashflow{to{stroke-dashoffset:-11;}}
.evt-pulse{transform-origin:center;animation:evtpulse 2.2s ease-out infinite;}
@keyframes evtpulse{0%{transform:scale(.5);opacity:.5;}70%{transform:scale(1.5);opacity:0;}100%{opacity:0;}}

.spin{animation:spin 1s linear infinite;transform-origin:center;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ============ SETTINGS MODAL ============ */
.modal-backdrop{position:fixed;inset:0;background:rgba(4,7,12,.66);backdrop-filter:blur(3px);display:grid;place-items:center;z-index:50;}
.modal{width:min(620px,92vw);max-height:86vh;display:flex;flex-direction:column;background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--border-strong);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);}
.modal-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border-soft);}
.modal-head h2{font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-2);margin:0;}
.modal-head .btn.icon{margin-left:auto;}
.modal-body{overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:16px;}
.modal-foot{display:flex;justify-content:flex-end;gap:9px;padding:13px 16px;border-top:1px solid var(--border-soft);}
.set-group-title{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--text-3);font-weight:600;margin-bottom:9px;}
.set-row{display:flex;align-items:center;gap:12px;justify-content:space-between;padding:6px 0;}
.set-label{font-size:13px;color:var(--text);display:flex;align-items:center;gap:6px;}
.set-help{font-style:normal;width:15px;height:15px;border-radius:50%;border:1px solid var(--border-strong);color:var(--text-3);font-size:10px;display:inline-grid;place-items:center;cursor:help;}
.set-row select,.set-row input[type=number],.set-row input[type=text]{width:200px;background:var(--bg-2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:7px 9px;font-family:var(--sans);font-size:13px;}
.set-row input[type=number]{font-family:var(--mono);}
.set-bool input{width:18px;height:18px;}
.set-adv summary{cursor:pointer;font-size:12px;color:var(--text-2);padding:9px 0;border-top:1px solid var(--border-soft);}
.set-err{background:var(--sev-critical-bg);border:1px solid rgba(255,77,94,.5);color:#FF8088;border-radius:8px;padding:9px 12px;font-size:12px;}
.set-loading{color:var(--text-3);font-size:13px;padding:20px;text-align:center;}

.order-row.sel{background:var(--panel-3);}
.empty.compact{min-height:220px;height:auto;}

@media (max-width: 1180px){
  body{overflow:auto;}
  #root{height:auto;min-height:100vh;}
  .app{min-height:100vh;height:auto;}
  .header{flex-wrap:wrap;}
  .brand{border-right:none;padding-right:0;}
  .kpis{order:3;flex-basis:100%;}
  .ops-layout{
    grid-template-columns:minmax(280px,360px) minmax(420px,1fr);
    grid-template-areas:
      "queue map"
      "context map";
    height:auto;
  }
  .queue-rail{grid-area:queue;min-height:420px;}
  .map-workspace{grid-area:map;min-height:650px;}
  .context-rail{grid-area:context;min-height:420px;}
}

@media (max-width: 840px){
  .ops-layout{
    display:flex;
    flex-direction:column;
  }
  .map-workspace{min-width:0;min-height:520px;}
  .map-shell{min-height:420px;}
  .kpis{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));}
  .simctl{border-left:none;padding-left:0;flex-wrap:wrap;}
  .queue-tabs{grid-template-columns:repeat(2,1fr);}
  .loading-slot{width:150px;}
}
</style>
</head>

<div id="root"></div>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="theme.jsx?v=7"></script>
<script type="text/babel" src="icons.jsx?v=7"></script>

<script type="text/babel" src="map.jsx?v=9"></script>
<script type="text/babel" src="panels.jsx?v=8"></script>
<script type="text/babel" src="daylog.jsx?v=1"></script>
